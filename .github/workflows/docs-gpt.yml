name: Doxygen GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Cache HAL driver
        uses: actions/cache@v4
        with:
          path: /tmp/hal-driver
          key: hal-driver-${{ runner.os }}

      - name: Clone HAL driver (if needed)
        run: |
          if [ ! -d "/tmp/hal-driver" ]; then
            git clone --depth 1 https://github.com/STMicroelectronics/stm32f4xx-hal-driver.git /tmp/hal-driver
          fi

      - name: Run Doxygen
        run: |
          mkdir -p docs/html
          sed 's|/src/hal-driver|/tmp/hal-driver|g; s|/docs/output|docs|g' Doxyfile > Doxyfile.ci
          doxygen Doxyfile.ci

      - name: Add .nojekyll
        run: touch docs/html/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/html
          force_orphan: true
