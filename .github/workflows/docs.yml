name: Doxygen GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/doxygen/doxygen:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y git graphviz

      - name: Clone HAL driver (master only)
        run: |
          git clone --depth 1 --branch master \
            https://github.com/STMicroelectronics/stm32f4xx-hal-driver.git \
            hal-driver

      - name: Run Doxygen
        run: |
          mkdir -p docs/html
          sed 's|/src/hal-driver|hal-driver|g; s|/docs/output|docs|g' Doxyfile > Doxyfile.ci
          doxygen Doxyfile.ci

      - name: Add .nojekyll
        run: touch docs/html/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/html
          force_orphan: true