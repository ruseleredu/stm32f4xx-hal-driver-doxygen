name: Doxygen GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    container:
      image: ruseler/doxygen:alpine

    steps:
      - uses: actions/checkout@v6

      - name: Clone HAL driver (master only)
        run: |
          git clone --depth 1 --branch master \
            https://github.com/STMicroelectronics/stm32f4xx-hal-driver.git \
            hal-driver

      - name: Run Doxygen
        run: |
          mkdir -p docs/html
          doxygen Doxyfile.ci

      - name: Add .nojekyll
        run: touch docs/html/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v5
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/html
          force_orphan: true
